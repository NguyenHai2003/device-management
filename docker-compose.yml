services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: device-management-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Tune polling/heartbeat intervals if needed
      # - SYSTEM_METRICS_STREAM_INTERVAL_MS=2000
      # - SSE_HEARTBEAT_INTERVAL_MS=15000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: device-management-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      # Point frontend SSE stream to backend container
      - NEXT_PUBLIC_METRICS_SSE_URL=http://backend:3001/api/system-metrics
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    name: device-management-network
