name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      # Install all workspace dependencies from root
      - name: Install monorepo dependencies
        run: npm install

      - name: Force install Tailwind CSS Linux binary
        run: npm install @tailwindcss/oxide-linux-x64-gnu --save-optional -w frontend

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install --with-deps
        working-directory: e2e-tests

      - name: Build frontend for E2E tests
        run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_METRICS_SSE_URL: http://127.0.0.1:3001/api/system-metrics

      - name: Run Playwright tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 30
