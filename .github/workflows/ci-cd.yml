name: CI/CD Pipeline

# Trigger:
# - push for main/master: run pipeline (test → build → deploy)
# - pull_request for main/master: run job test
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Unit Test + E2E Playwright
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests (Unit + E2E)
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install monorepo dependencies
        run: npm install

      - name: Force install Tailwind CSS Linux (gnu) binary
        run: npm install @tailwindcss/oxide-linux-x64-gnu --save-optional -w frontend

      - name: Install Playwright browsers
        timeout-minutes: 10
        run: npx playwright install --with-deps
        working-directory: e2e-tests

      - name: Build frontend for E2E tests
        run: npm run build --workspace=frontend
        env:
          NEXT_PUBLIC_METRICS_SSE_URL: http://127.0.0.1:3001/api/system-metrics

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e-tests/playwright-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Docker Image và Push lên GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_OWNER/device-management-backend:latest"
          docker build -t $IMAGE_NAME -f backend/Dockerfile .
          docker push $IMAGE_NAME

      - name: Build and Push Frontend Image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$REPO_OWNER/device-management-frontend:latest"
          # Truyền IP Public EC2 vào lúc build để Next.js nhúng URL gọi API backend
          docker build \
            --build-arg NEXT_PUBLIC_METRICS_SSE_URL=http://${{ secrets.EC2_HOST }}:3001/api/system-metrics \
            -t $IMAGE_NAME -f frontend/Dockerfile .
          docker push $IMAGE_NAME

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: SSH into EC2 and Deploy 
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/"

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export EC2_HOST=${{ secrets.EC2_HOST }}

            # Login to GHCR with PAT Token to pull images
            echo ${{ secrets.GH_PAT_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Stop running containers (ignore errors if no containers are running)
            docker compose -f docker-compose.prod.yml down || true

            # Pull the latest Docker Images from GHCR
            docker compose -f docker-compose.prod.yml pull

            # Restart containers with new images
            docker compose -f docker-compose.prod.yml up -d

            # Clean up old images to save disk space on EC2
            docker image prune -f
